name: Storybook

# Storybook build + GitHub Pages publish.
#
# On every PR: build the static catalog to verify it compiles. No deploy.
# On push to main: build AND publish to GitHub Pages so the catalog URL
# (https://floxcristian.github.io/prime-showcase/) always reflects main.
#
# Pages deploy uses the official actions/deploy-pages workflow, which is
# the canonical pattern Polaris / Primer / Carbon all use to publish their
# Storybook builds. No third-party services (Chromatic etc.) needed for
# the basic catalog publish; Chromatic visual regression is a separate
# opt-in workflow if/when the team adds it.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # Pages deploy needs:
  pages: write
  id-token: write

# Allow only one concurrent deployment, but cancel the older one if a new
# main push comes in. Aligns with GitHub's recommended Pages config.
concurrency:
  group: storybook
  cancel-in-progress: true

jobs:
  build:
    name: Build static Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Pages artifact
        # Only on push to main — PRs build for verification but don't deploy.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/storybook

  deploy:
    # Skipped for PRs — only main publishes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
