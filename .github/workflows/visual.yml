name: Visual regression

# Visual regression pipeline. Runs on every PR + every push to main.
#
# Mirrors the approach Polaris/Primer/Chromatic use:
#   1. Production build, then start the SSR server on :4000 (same as the
#      smoke job in ci.yml — single-environment screenshots, no devserver
#      variance).
#   2. Install ONLY the chromium browser (cuts ~80s vs the default install).
#   3. Run the `visual` Playwright project against the boot. Baselines live
#      in `tests/visual/__screenshots__` and are committed to the repo.
#   4. On failure, upload `playwright-report/` + the diff `test-results/`
#      directory so reviewers can see actual vs expected without re-running.
#
# Re-baselining flow (for the contributor):
#   1. Make the intentional UI change in your branch.
#   2. Run `npm run visual:update` locally — regenerates baselines.
#   3. Review the diff IMAGE BY IMAGE before committing. Anything you can't
#      explain is a regression hiding in the changeset.
#   4. Commit `tests/visual/__screenshots__/**` together with the source change.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  visual:
    name: Playwright visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # chromium only — visual diffs across browsers add noise without
      # catching design-system bugs (see playwright.config.ts rationale).
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # The visual suite needs the production SSR build, not the dev server.
      # Token resolution + Tailwind purge + bundle splitting are all
      # production behaviors we want pixel-locked.
      - name: Build (production)
        run: npm run build

      # Storybook component baselines (tests/visual/storybook.spec.ts)
      # corren contra Storybook estático en :6006. Sin esta build + serve,
      # los tests fallan al hacer ping en el `beforeAll`. El golden-paths
      # suite usa el SSR app en :4000 (boot via playwright.config.ts
      # `webServer`), no comparte esta capa.
      - name: Build Storybook
        run: npm run build-storybook

      - name: Serve Storybook on :6006
        run: |
          npx http-server dist/storybook -p 6006 -c-1 --silent &
          echo "SB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6006/ -o /dev/null; then
              echo "Storybook up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Storybook did not come up within 30s" >&2
          exit 1

      - name: Run visual regression
        env:
          CI: 'true'
        run: npx playwright test --project=visual

      # Cleanup del Storybook server siempre — un proceso colgado pinea
      # el runner hasta el timeout del job. Patron `if: always()` igual
      # que el SSR teardown en ci.yml.
      - name: Stop Storybook server
        if: always()
        run: |
          if [ -n "${SB_PID:-}" ] && kill -0 "$SB_PID" 2>/dev/null; then
            kill "$SB_PID"
            echo "Stopped Storybook server (pid=$SB_PID)"
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
