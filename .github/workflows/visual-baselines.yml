name: Visual baselines (manual)

# One-shot maintainer workflow to refresh visual-regression baselines.
#
# Why this exists:
#   tests/visual/__screenshots__/**.png are the reference images for the
#   `visual` Playwright project. They MUST be committed to the repo so
#   PR runs have something to diff against. Generating them locally
#   requires the Playwright browser binary (~200MB download) AND working
#   :4000 / :6006 ports — friction enough that the team avoids doing it.
#
# This workflow removes that friction:
#   1. Maintainer goes to Actions → "Visual baselines (manual)" → Run.
#   2. Runner installs deps, boots SSR + Storybook, generates ALL
#      baselines via tools/visual/baseline.sh.
#   3. Pushes the regenerated `tests/visual/__screenshots__/**` to a
#      branch and opens a PR titled "chore(visual): refresh baselines".
#   4. Maintainer reviews the diff image-by-image, merges if intentional.
#
# Mirrors the SaaS pattern (Chromatic / Argos / Percy) without the SaaS
# dependency. Same control-loop: changes propose a baseline update, a
# human approves it.
#
# Triggered manually (workflow_dispatch). Never runs on push / PR.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which baselines to refresh'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - routes
          - storybook

permissions:
  contents: write       # commit the regenerated PNGs to a branch
  pull-requests: write  # open the PR

concurrency:
  group: visual-baselines
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh ${{ inputs.target }} baselines
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We will push to a feature branch, so fetch full history.
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install http-server (for Storybook static serve)
        # bundled in the orchestrator script; declared explicitly here
        # so the install is visible in the workflow log.
        run: npm install --no-save --no-audit --no-fund http-server

      - name: Run baseline orchestrator
        env:
          CI: 'true'
        run: tools/visual/baseline.sh "${{ inputs.target }}"

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet tests/visual/__screenshots__; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No baseline drift detected — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Baselines drifted:"
            git diff --stat tests/visual/__screenshots__
          fi

      - name: Open PR with refreshed baselines
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/visual-baselines-$(date +%s)"
          git checkout -b "$BRANCH"
          git add tests/visual/__screenshots__/
          git commit -m "chore(visual): refresh ${{ inputs.target }} baselines

Generated by .github/workflows/visual-baselines.yml run #${{ github.run_id }}.
Review the diff image-by-image before merging — anything you can't
explain is a regression hiding in the changeset."
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(visual): refresh ${{ inputs.target }} baselines" \
            --body "Automated baseline refresh from workflow_dispatch run #${{ github.run_id }}.

Review the diff image-by-image. Merge only if every change is intentional." \
            --head "$BRANCH" \
            --base main

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-baseline-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
