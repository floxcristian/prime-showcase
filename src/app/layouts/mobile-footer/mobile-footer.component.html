<nav aria-label="Navegación principal" class="flex h-full list-none p-0 m-0">
  @for (item of items; track item.label) {
    @if (item.routerLink) {
      <a
        [routerLink]="item.routerLink"
        routerLinkActive
        #rla="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeOverlays()"
        [attr.aria-current]="rla.isActive && !nav.anyOverlayOpen() ? 'page' : null"
        [ngClass]="
          rla.isActive && !nav.anyOverlayOpen()
            ? 'text-primary'
            : 'text-muted-color'
        "
        class="flex-1 flex flex-col items-center justify-center gap-1 py-2 px-1 cursor-pointer hover:bg-emphasis transition-colors select-none"
      >
        <i
          class="text-2xl"
          [class]="item.icon"
          [ngClass]="
            rla.isActive && !nav.anyOverlayOpen()
              ? 'fa-sharp fa-solid'
              : 'fa-sharp fa-regular'
          "
          aria-hidden="true"
        ></i>
        <span
          class="text-xs font-medium leading-4 truncate w-full text-center"
        >
          {{ item.label }}
        </span>
      </a>
    } @else if (item.action) {
      @let active = isActionActive(item.action);
      <button
        type="button"
        (click)="handleAction(item.action)"
        [attr.data-nav-trigger]="item.action === 'nav' ? '' : null"
        [attr.aria-pressed]="active"
        [ngClass]="active ? 'text-primary' : 'text-muted-color'"
        class="flex-1 flex flex-col items-center justify-center gap-1 py-2 px-1 cursor-pointer hover:bg-emphasis transition-colors select-none bg-transparent"
      >
        <i
          class="text-2xl"
          [class]="item.icon"
          [ngClass]="active ? 'fa-sharp fa-solid' : 'fa-sharp fa-regular'"
          aria-hidden="true"
        ></i>
        <span
          class="text-xs font-medium leading-4 truncate w-full text-center"
        >
          {{ item.label }}
        </span>
      </button>
    }
  }
</nav>
