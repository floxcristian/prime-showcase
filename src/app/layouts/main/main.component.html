<div
  class="bg-surface-50 dark:bg-surface-900 w-full h-dvh flex flex-col overflow-hidden"
>
  @if (nav.currentUrl() === '/notifications') {
    <app-primary-title-toolbar title="Notificaciones" class="md:hidden">
      <button
        leading
        type="button"
        (click)="nav.goBack()"
        aria-label="Volver"
        class="w-11 h-11 rounded-lg flex items-center justify-center text-surface-0 bg-transparent hover:bg-surface-950/25 cursor-pointer transition-colors select-none shrink-0"
      >
        <i
          class="fa-sharp fa-regular fa-arrow-left text-xl"
          aria-hidden="true"
        ></i>
      </button>
    </app-primary-title-toolbar>
    <app-toolbar [elevated]="isScrolled()" class="hidden md:flex" />
  } @else {
    <app-toolbar [elevated]="isScrolled()" />
  }
  <div class="flex-1 flex overflow-hidden relative">
    <main
      #mainContent
      id="main-content"
      tabindex="-1"
      class="flex flex-col flex-1 w-full h-full overflow-y-auto bg-surface-50 dark:bg-surface-900"
    >
      @if (nav.currentUrl() === '/notifications') {
        <app-page-title-bar title="Notificaciones" class="hidden md:flex" />
      } @else {
        <app-breadcrumb-bar />
      }
      <div
        class="flex flex-col flex-1 lg:p-6"
        [class.p-2]="nav.currentUrl() !== '/notifications'"
      >
        <router-outlet />
      </div>
    </main>
  </div>
  <app-mobile-footer />
  <app-nav-overlay />
  <app-mobile-search-overlay />
  <app-mobile-more-overlay />
  <app-mobile-notifications-overlay />
</div>
