@let active = nav.activeModule();
@if (active) {
  <div class="flex items-center px-4 h-14 shrink-0 border-b border-surface">
    <div class="text-color font-semibold leading-6 truncate flex-1">
      {{ active.title }}
    </div>
  </div>
  <nav [attr.aria-label]="active.title" class="flex-1 flex flex-col overflow-hidden">
    <app-nav-sections [module]="active" />
  </nav>
}
