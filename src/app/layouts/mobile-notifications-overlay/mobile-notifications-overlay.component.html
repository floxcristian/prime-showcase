@if (nav.notificationsOverlayOpen()) {
  <div
    role="dialog"
    aria-modal="true"
    aria-label="Notificaciones"
    cdkTrapFocus
    [cdkTrapFocusAutoCapture]="true"
    class="md:hidden fixed inset-x-0 bottom-16 top-0 z-30 bg-surface-0 dark:bg-surface-950 flex flex-col"
  >
    <app-primary-title-toolbar title="Notificaciones">
      <app-back-button leading (pressed)="close()" />
    </app-primary-title-toolbar>
    <!-- Scroll container: el <app-notifications> dentro tiene host flex-col
         con sticky date headers `top-0`, que se anclan al top de este
         overflow-y-auto (NO al viewport) — por eso el scroll propio del
         overlay es quien provee el context de sticky, no <main>. -->
    <div class="flex-1 overflow-y-auto flex flex-col">
      <app-notifications />
    </div>
  </div>
}
