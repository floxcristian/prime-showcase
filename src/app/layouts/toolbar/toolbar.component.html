<!-- Left: logo + hamburger (oculto en mobile — menú via footer nav) -->
<div class="flex-1 hidden md:flex items-center gap-6 min-w-0">
  <!-- Logo — hover limitado al logo mismo, no al bloque completo -->
  <!-- Oculto en mobile: pantallas <md ya tienen el hamburger "Categorías" y
       búsqueda, el logo compite por espacio horizontal. Patrón e-commerce
       (Lider mobile, Santa Isabel mobile, Mercado Libre app). -->
  <a
    routerLink="/"
    aria-label="Ir al inicio"
    class="shrink-0 hidden md:flex items-center h-12 px-1 rounded-lg hover:opacity-70 transition-opacity cursor-pointer"
  >
    <img
      src="implementos-logo.svg"
      alt="Implementos"
      height="48"
      class="h-12 w-auto"
    />
  </a>

  <!-- Sidebar toggle -->
  <button
    #navTrigger
    data-nav-trigger
    type="button"
    (click)="nav.toggleSidebar()"
    [attr.aria-label]="nav.sidebarOpen() ? 'Cerrar menú' : 'Abrir menú'"
    [attr.aria-pressed]="nav.sidebarOpen()"
    [ngClass]="{
      'bg-primary-700 dark:bg-primary-800': nav.sidebarOpen(),
      'bg-primary-600 dark:bg-primary-700 hover:bg-primary-700 dark:hover:bg-primary-800':
        !nav.sidebarOpen(),
    }"
    class="text-surface-0 h-10 px-3 gap-3 rounded-lg flex items-center cursor-pointer transition-colors select-none shrink-0"
  >
    <span class="relative w-4 h-4 shrink-0">
      <i
        class="fa-sharp fa-regular fa-bars-staggered absolute inset-0 transition-[transform,opacity] duration-200"
        [ngClass]="
          nav.sidebarOpen() ? 'opacity-0 scale-50' : 'opacity-100 scale-100'
        "
        aria-hidden="true"
      ></i>
      <i
        class="fa-sharp fa-regular fa-xmark absolute inset-0 transition-[transform,opacity] duration-200"
        [ngClass]="
          nav.sidebarOpen() ? 'opacity-100 scale-100' : 'opacity-0 scale-50'
        "
        aria-hidden="true"
      ></i>
    </span>
    <span class="font-semibold leading-6">Categorías</span>
  </button>
</div>

<!-- Center: global search — único control visible en mobile, full width -->
<p-iconfield iconPosition="left" class="block flex-1 md:max-w-xl">
  <p-inputicon class="fa-sharp fa-regular fa-magnifying-glass" />
  <input
    type="text"
    pInputText
    placeholder="Buscar módulos, pantallas, acciones..."
    class="w-full"
  />
</p-iconfield>

<!-- Right actions (oculto en mobile — theme/bell/cuenta via drawer + footer) -->
<div class="flex-1 hidden md:flex items-center gap-1 justify-end min-w-0">
  <button
    type="button"
    (click)="toggleTheme()"
    [attr.aria-label]="
      darkTheme() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'
    "
    [pTooltip]="darkTheme() ? 'Tema claro' : 'Tema oscuro'"
    tooltipPosition="bottom"
    class="w-10 h-10 rounded-lg flex items-center justify-center text-surface-0 hover:bg-primary-700 dark:hover:bg-primary-800 bg-transparent cursor-pointer transition-colors select-none"
  >
    <i
      [ngClass]="darkTheme() ? 'fa-sun' : 'fa-moon'"
      class="fa-sharp fa-regular"
      aria-hidden="true"
    ></i>
  </button>
  <button
    type="button"
    aria-label="Notificaciones"
    pTooltip="Notificaciones"
    tooltipPosition="bottom"
    class="relative w-10 h-10 rounded-lg flex items-center justify-center text-surface-0 hover:bg-primary-700 dark:hover:bg-primary-800 bg-transparent cursor-pointer transition-colors select-none"
  >
    <i class="fa-sharp fa-regular fa-bell" aria-hidden="true"></i>
    <span
      aria-hidden="true"
      class="absolute top-2 right-2 w-2 h-2 rounded-full bg-[var(--p-red-500)] ring-2 ring-surface-0 dark:ring-surface-950"
    ></span>
  </button>
  <button
    #settingsTrigger
    type="button"
    (click)="userMenuRef.toggle($event)"
    aria-label="Mi cuenta"
    aria-haspopup="menu"
    pTooltip="Mi cuenta"
    tooltipPosition="bottom"
    class="ml-1 rounded-full cursor-pointer hover:opacity-70 transition-opacity select-none"
  >
    <p-avatar
      image="https://www.primefaces.org/cdn/primevue/images/landing/apps/main-avatar.png"
      shape="circle"
      size="normal"
      class="flex"
    />
  </button>
  <p-menu #userMenuRef [model]="userMenu" [popup]="true" appendTo="body" />
</div>

@defer (on interaction(settingsTrigger); prefetch on hover(settingsTrigger); when nav.accountDrawerOpen()) {
  <app-settings-drawer
    [visible]="nav.accountDrawerOpen()"
    (visibleChange)="nav.accountDrawerOpen.set($event)"
    (hidden)="restoreSettingsTriggerFocus()"
  />
}
