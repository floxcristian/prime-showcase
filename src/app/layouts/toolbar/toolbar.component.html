<!-- Left: logo + hamburger (oculto en mobile — menú via footer nav) -->
<div class="flex-1 hidden md:flex items-center gap-6 min-w-0">
  <!-- Logo — hover limitado al logo mismo, no al bloque completo -->
  <!-- Oculto en mobile: pantallas <md ya tienen el hamburger "Categorías" y
       búsqueda, el logo compite por espacio horizontal. Patrón e-commerce
       (Lider mobile, Santa Isabel mobile, Mercado Libre app). -->
  <a
    routerLink="/"
    aria-label="Ir al inicio"
    class="shrink-0 hidden md:flex items-center h-12 px-1 rounded-lg hover:opacity-70 transition-opacity cursor-pointer"
  >
    <img
      src="implementos-logo.svg"
      alt="Implementos"
      height="48"
      class="h-12 w-auto"
    />
  </a>

  <!-- Sidebar toggle -->
  <button
    #navTrigger
    data-nav-trigger
    type="button"
    (click)="nav.toggleSidebar()"
    [attr.aria-label]="nav.sidebarOpen() ? 'Cerrar menú' : 'Abrir menú'"
    [attr.aria-pressed]="nav.sidebarOpen()"
    [ngClass]="{
      'bg-surface-950/50': nav.sidebarOpen(),
      'bg-surface-950/25 hover:bg-surface-950/40': !nav.sidebarOpen(),
    }"
    class="text-surface-0 h-11 px-3 gap-3 rounded-lg flex items-center cursor-pointer transition-colors select-none shrink-0"
  >
    <span class="relative w-4 h-4 shrink-0">
      <i
        class="fa-sharp fa-regular fa-bars-staggered absolute inset-0 transition-[transform,opacity] duration-200"
        [ngClass]="
          nav.sidebarOpen() ? 'opacity-0 scale-50' : 'opacity-100 scale-100'
        "
        aria-hidden="true"
      ></i>
      <i
        class="fa-sharp fa-regular fa-xmark absolute inset-0 transition-[transform,opacity] duration-200"
        [ngClass]="
          nav.sidebarOpen() ? 'opacity-100 scale-100' : 'opacity-0 scale-50'
        "
        aria-hidden="true"
      ></i>
    </span>
    <span class="font-semibold leading-6">Menú</span>
  </button>
</div>

<!-- Mobile logo: reemplaza el search input en <md. Misma imagen que el logo
     del aside del login (implementos-logo.svg) para reforzar brand identity
     en el topbar mobile donde no hay left block (logo + hamburger ocultos).
     flex-1 para que el bell quede pegado al borde derecho via justify via gap. -->
<a
  routerLink="/"
  aria-label="Ir al inicio"
  class="md:hidden flex-1 flex items-center h-12 px-1 rounded-lg hover:opacity-70 transition-opacity cursor-pointer"
>
  <img
    src="implementos-logo.svg"
    alt="Implementos"
    height="48"
    class="h-12 w-auto"
  />
</a>

<!-- Desktop search — oculto en mobile porque ahí el logo toma su lugar. -->
<p-iconfield iconPosition="left" class="hidden md:block flex-1 md:max-w-xl">
  <p-inputicon class="fa-sharp fa-regular fa-magnifying-glass" />
  <input
    type="text"
    pInputText
    placeholder="Buscar módulos, pantallas, acciones..."
    class="w-full h-11"
  />
</p-iconfield>

<!-- Búsqueda mobile — dispara el search overlay full-screen con búsquedas
     recientes + vistos recientemente. Mismo styling ghost que el bell. -->
<button
  type="button"
  (click)="nav.searchOverlayOpen.set(true)"
  aria-label="Buscar"
  class="md:hidden w-11 h-11 rounded-lg flex items-center justify-center text-surface-0 bg-transparent hover:bg-surface-950/25 cursor-pointer transition-colors select-none shrink-0"
>
  <i
    class="fa-sharp fa-regular fa-magnifying-glass text-xl"
    aria-hidden="true"
  ></i>
</button>

<!-- Notificaciones mobile — duplicado del botón de la derecha (hidden md:flex)
     porque en mobile el right-actions block está oculto y queremos que la
     campana quede accesible junto al input de búsqueda. Usa el mismo dark
     tonal translúcido (bg-surface-950/25) que los otros botones del toolbar
     para leerse como contenedor con masa visual comparable al input, no
     como un icono flotante. -->
<button
  type="button"
  [routerLink]="'/notifications'"
  aria-label="Notificaciones, 3 nuevas"
  class="md:hidden w-11 h-11 rounded-lg flex items-center justify-center text-surface-0 bg-transparent hover:bg-surface-950/25 cursor-pointer transition-colors select-none shrink-0"
>
  <span class="relative inline-flex mt-1">
    <i class="fa-sharp fa-regular fa-bell text-xl" aria-hidden="true"></i>
    <span
      aria-hidden="true"
      class="absolute -top-2 -right-1 min-w-4 h-4 px-1 rounded-full bg-[var(--p-red-500)] flex items-center justify-center text-xs font-semibold text-surface-0 leading-none"
      >3</span
    >
  </span>
</button>

<!-- Right actions (oculto en mobile — theme/bell/cuenta via drawer + footer) -->
<div class="flex-1 hidden md:flex items-center gap-1 justify-end min-w-0">
  <button
    type="button"
    (click)="toggleTheme()"
    [attr.aria-label]="
      darkTheme() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'
    "
    [pTooltip]="darkTheme() ? 'Tema claro' : 'Tema oscuro'"
    tooltipPosition="bottom"
    class="w-11 h-11 rounded-lg flex items-center justify-center text-surface-0 hover:bg-primary-700 dark:hover:bg-primary-800 bg-transparent cursor-pointer transition-colors select-none"
  >
    <i
      [ngClass]="darkTheme() ? 'fa-sun' : 'fa-moon'"
      class="fa-sharp fa-regular"
      aria-hidden="true"
    ></i>
  </button>
  <button
    type="button"
    [routerLink]="'/notifications'"
    aria-label="Notificaciones, 3 nuevas"
    pTooltip="Notificaciones"
    tooltipPosition="bottom"
    class="w-11 h-11 rounded-lg flex items-center justify-center text-surface-0 hover:bg-primary-700 dark:hover:bg-primary-800 bg-transparent cursor-pointer transition-colors select-none"
  >
    <span class="relative inline-flex mt-1">
      <i class="fa-sharp fa-regular fa-bell" aria-hidden="true"></i>
      <span
        aria-hidden="true"
        class="absolute -top-2 -right-2 min-w-4 h-4 px-1 rounded-full bg-[var(--p-red-500)] flex items-center justify-center text-xs font-semibold text-surface-0 leading-none"
        >3</span
      >
    </span>
  </button>
  <div
    class="w-px h-6 mx-2 bg-primary-50 shrink-0"
    aria-hidden="true"
  ></div>
  <button
    #settingsTrigger
    type="button"
    (click)="userMenuRef.toggle($event)"
    aria-label="Mi cuenta"
    aria-haspopup="menu"
    class="h-11 w-40 pl-1 pr-3 gap-2 rounded-lg flex items-center text-left bg-surface-950/25 hover:bg-surface-950/40 cursor-pointer transition-colors select-none text-surface-0"
  >
    <p-avatar
      image="https://www.primefaces.org/cdn/primevue/images/landing/apps/main-avatar.png"
      size="normal"
      class="rounded-lg overflow-hidden flex shrink-0"
    />
    <div class="flex-1 min-w-0 flex flex-col">
      <span class="font-semibold leading-none truncate">Brook</span>
      <span class="text-xs font-medium leading-4 truncate">Ejecutivo</span>
    </div>
    <i
      class="fa-sharp fa-regular fa-chevron-down text-xs text-surface-0 shrink-0"
      aria-hidden="true"
    ></i>
  </button>
  <p-menu
    #userMenuRef
    [model]="userMenu"
    [popup]="true"
    appendTo="body"
    styleClass="menu-with-arrow"
  />
</div>

@defer (
  on interaction(settingsTrigger);
  prefetch on hover(settingsTrigger);
  when nav.accountDrawerOpen()
) {
  <app-settings-drawer
    [visible]="nav.accountDrawerOpen()"
    (visibleChange)="nav.accountDrawerOpen.set($event)"
    (hidden)="restoreSettingsTriggerFocus()"
  />
}
