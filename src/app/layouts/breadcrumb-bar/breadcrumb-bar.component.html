<nav
  aria-label="Ruta de navegación"
  class="flex-1 min-w-0 flex items-center gap-2 overflow-x-auto lg:overflow-visible [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
>
  @for (crumb of nav.breadcrumb(); track $index; let last = $last) {
    <div class="flex items-center gap-2 lg:min-w-0">
      <span
        [ngClass]="{
          'text-color font-semibold leading-6': last,
          'text-muted-color font-medium leading-6': !last
        }"
        class="whitespace-nowrap lg:truncate"
      >
        {{ crumb.title }}
      </span>
      @if (!last) {
        <i
          class="fa-sharp fa-regular fa-chevron-right text-muted-color text-xs"
          aria-hidden="true"
        ></i>
      }
    </div>
  }
</nav>

<div class="shrink-0 flex items-center gap-2">
  <ng-content />
</div>
