@if (nav.searchOverlayOpen()) {
  <div
    role="dialog"
    aria-modal="true"
    aria-label="Búsqueda"
    cdkTrapFocus
    [cdkTrapFocusAutoCapture]="true"
    class="lg:hidden fixed inset-0 z-30 bg-surface-0 dark:bg-surface-950 flex flex-col"
  >
    <!-- Header sticky: back + search input. Misma altura h-16 que el toolbar
         real + mismo bg primary para que se perciba como "extensión" del
         topbar, no como un modal flotante desconectado. -->
    <div
      class="h-16 shrink-0 flex items-center gap-2 px-2 toolbar-brand-bg relative z-10"
    >
      <button
        type="button"
        (click)="close()"
        aria-label="Cerrar búsqueda"
        class="w-11 h-11 rounded-lg flex items-center justify-center text-surface-0 bg-transparent hover:bg-surface-950/25 cursor-pointer transition-colors select-none shrink-0"
      >
        <i
          class="fa-sharp fa-regular fa-arrow-left text-xl"
          aria-hidden="true"
        ></i>
      </button>
      <p-iconfield iconPosition="left" class="block flex-1">
        <p-inputicon class="fa-sharp fa-regular fa-magnifying-glass" />
        <input
          cdkFocusInitial
          type="text"
          pInputText
          placeholder="¿Qué estás buscando?"
          class="w-full h-11"
        />
      </p-iconfield>
    </div>

    <!-- Content scrollable. El contenido (chips + list + empty state) lo
         provee <app-search-suggestions>, compartido con el dropdown desktop
         del toolbar. (click)="close()" cierra el overlay cuando el user
         selecciona un item (chip re-search o view navigate). -->
    <div class="flex-1 overflow-y-auto px-4 py-4">
      <app-search-suggestions (itemSelected)="close()" />
    </div>
  </div>
}
