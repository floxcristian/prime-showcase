<ul>
  @for (
    section of module().sections;
    track section.id;
    let sectionIdx = $index
  ) {
    <li>
      <!-- L2 header: border-t absorbido dentro del min-h-12 (box-sizing: border-box).
           sectionIdx > 0 evita línea encima del primer header del panel.
           min-h-12 + py-2 permite que títulos largos wrappeen sin cortarse
           (patrón multi-line cuando el contenido lo requiere). -->
      <div
        class="flex items-center gap-3 px-4 min-h-12 py-2 bg-surface-100 dark:bg-surface-800"
        [ngClass]="{
          'border-t border-surface-200 dark:border-surface-800':
            sectionIdx > 0
        }"
      >
        <i
          [class]="section.icon"
          class="w-5 text-center text-base shrink-0 text-color"
          aria-hidden="true"
        ></i>
        <h3 class="flex-1 font-semibold leading-6 text-color">
          {{ section.title }}
        </h3>
      </div>
      <ul>
        @for (leaf of section.children; track leaf.title + leaf.url) {
          <li>
            <a
              [routerLink]="leaf.url"
              (click)="leafClicked.emit()"
              routerLinkActive="!text-primary !bg-primary-100 dark:!bg-primary-900"
              [routerLinkActiveOptions]="{ exact: true }"
              #rla="routerLinkActive"
              [attr.aria-current]="rla.isActive ? 'page' : null"
              [ngClass]="{
                'text-muted-color hover:text-color': !rla.isActive
              }"
              class="flex items-center gap-3 px-4 min-h-12 py-2 bg-surface-0 dark:bg-surface-950 border-t border-surface-200 dark:border-surface-800 hover:bg-emphasis cursor-pointer transition-colors select-none font-medium leading-6"
            >
              <span class="w-5 shrink-0" aria-hidden="true"></span>
              <span class="flex-1">{{ leaf.title }}</span>
            </a>
          </li>
        }
      </ul>
    </li>
  }
</ul>
