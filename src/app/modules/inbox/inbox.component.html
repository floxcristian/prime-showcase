<div
  class="w-64 h-full overflow-hidden border border-surface rounded-2xl flex flex-col"
  >
  <div
    class="flex items-center justify-between gap-2 p-4 border-b border-surface"
    >
    <h1 class="text-2xl font-medium leading-8 text-color">Correos</h1>
    <p-button icon="fa-sharp fa-regular fa-plus" text ariaLabel="Nuevo correo" pTooltip="Nuevo correo" tooltipPosition="bottom" />
  </div>
  <div
    class="flex-1 flex flex-col overflow-auto justify-between gap-4 pt-4 pb-4 px-4"
    >
    <div class="flex-1 overflow-auto flex flex-col gap-2">
      @for (navData of inboxNavs; track navData.title) {
        <div class="flex flex-col gap-2">
          <div
            class="font-medium leading-6 text-muted-color"
            >
            {{ navData.title }}
          </div>
          @for (nav of navData.navs; track nav.name) {
            <button
              type="button"
              (click)="activeInboxNav.set(nav.name)"
              [attr.aria-current]="activeInboxNav() === nav.name ? 'page' : null"
          [ngClass]="{
            'text-color bg-emphasis': activeInboxNav() === nav.name,
            'text-muted-color bg-transparent': activeInboxNav() !== nav.name
          }"
              class="px-4 py-2 rounded-lg flex items-center gap-2 cursor-pointer hover:bg-emphasis transition-colors"
              >
              <i [class]="nav.icon" aria-hidden="true"></i>
              <span class="font-medium">{{ nav.name }}</span>
            </button>
          }
        </div>
      }
    </div>
    <div>
      <div class="border border-surface rounded-lg px-4 pb-4 pt-3 mb-4">
        <div class="font-medium text-color mb-4">Versión gratuita</div>
        <p-progressbar [value]="75">
          <ng-template #content let-value>
            <span
              class="absolute inset-0 flex items-center justify-center font-medium text-primary-contrast leading-none"
              >4 días restantes</span
              >
            </ng-template>
          </p-progressbar>
        </div>
        <p-button label="Actualizar a PRO 🚀" styleClass="w-full p-button-tonal" />
      </div>
    </div>
  </div>
  <div
    class="flex-1 h-full overflow-hidden flex border border-surface rounded-2xl"
    >
    <p-table
      [value]="filteredTableData()"
      [selection]="selectedRows()"
      (selectionChange)="selectedRows.set($event)"
      dataKey="id"
      class="w-full"
      [dt]="tableTokens"
      [scrollable]="true"
      scrollHeight="flex"
      >
      <ng-template #caption>
        <div
          class="flex xl:items-center justify-between gap-2 flex-col xl:flex-row"
          >
          <div class="flex items-center gap-2">
            <p-checkbox [binary]="true" class="mr-1" />
            <p-button icon="fa-sharp fa-regular fa-envelope" outlined severity="secondary" ariaLabel="Marcar como leído" pTooltip="Marcar como leído" tooltipPosition="bottom" />
            <p-button
              icon="fa-sharp fa-regular fa-circle-exclamation"
              outlined
              severity="secondary"
              ariaLabel="Marcar como importante"
              pTooltip="Marcar como importante"
              tooltipPosition="bottom"
              />
              <p-button icon="fa-sharp fa-regular fa-tag" outlined severity="secondary" ariaLabel="Etiquetar" pTooltip="Etiquetar" tooltipPosition="bottom" />
              <p-button
                icon="fa-sharp fa-regular fa-inbox"
                label="Archivar"
                outlined
                severity="secondary"
                />
                <p-button
                  icon="fa-sharp fa-regular fa-trash"
                  label="Papelera"
                  outlined
                  severity="secondary"
                  />
                </div>
                <div class="flex items-center gap-2">
                  <p-iconfield iconPosition="left" class="w-6/12 xl:max-w-36">
                    <p-inputicon class="fa-sharp fa-regular fa-magnifying-glass"></p-inputicon>
                    <input
                      type="text"
                      pInputText
                      [ngModel]="search()"
                      (ngModelChange)="search.set($event)"
                      placeholder="Buscar"
                      aria-label="Buscar"
                      class="w-full"
                      />
                    </p-iconfield>
                    <p-button icon="fa-sharp fa-regular fa-filter" outlined severity="secondary" ariaLabel="Filtrar" pTooltip="Filtrar" tooltipPosition="bottom" />
                    <p-divider layout="vertical" class="m-0" />
                    <p-button icon="fa-sharp fa-regular fa-arrows-rotate" outlined severity="secondary" ariaLabel="Actualizar" pTooltip="Actualizar" tooltipPosition="bottom" />
                    <p-button
                      label="1 de 15"
                      class="!whitespace-nowrap"
                      outlined
                      severity="secondary"
                      />
                      <p-button icon="fa-sharp fa-regular fa-chevron-left" outlined severity="secondary" ariaLabel="Página anterior" pTooltip="Página anterior" tooltipPosition="bottom" />
                      <p-button icon="fa-sharp fa-regular fa-chevron-right" outlined severity="secondary" ariaLabel="Página siguiente" pTooltip="Página siguiente" tooltipPosition="bottom" />
                    </div>
                  </div>
                </ng-template>
                <ng-template #body let-data>
                  <tr class="group">
                    <td class="w-4">
                      <p-tableCheckbox [value]="data" />
                    </td>

                    <td class="w-10">
                      <button
                        type="button"
                        (click)="toggleBookmark(data)"
                        [attr.aria-label]="data.bookmarked ? 'Quitar destacado' : 'Destacar'"
                        [attr.aria-pressed]="data.bookmarked"
                        [pTooltip]="data.bookmarked ? 'Quitar destacado' : 'Destacar'"
                        tooltipPosition="top"
                        [ngClass]="{
                          'text-primary': data.bookmarked,
                          'text-muted-color hover:text-color': !data.bookmarked
                        }"
                        class="w-8 h-8 inline-flex items-center justify-center bg-transparent hover:bg-emphasis active:bg-surface-200 dark:active:bg-surface-700 cursor-pointer rounded-lg transition-colors select-none"
                      >
                        <i
                          [ngClass]="data.bookmarked ? 'fa-sharp fa-solid fa-star' : 'fa-sharp fa-regular fa-star'"
                          aria-hidden="true"
                        ></i>
                      </button>
                    </td>
                    <td>
                      <div class="flex items-center">
                        <p-overlayBadge severity="danger" class="w-fit">
                          <p-avatar
                            [image]="data.image"
                            [label]="!data.image ? data.capName : ''"
                [ngClass]="{
                  '!bg-primary-100 !text-primary-950 text-xs font-medium':
                    !data.image,
                  'rounded-lg overflow-hidden flex': true
                }"
                            />
                          </p-overlayBadge>

                          <div class="ml-4 leading-6 text-color font-medium">
                            {{ data.name }}
                          </div>
                        </div>
                      </td>

                      <td class="min-w-56 max-w-80">
                        <div class="truncate">
                          <span class="text-color leading-6 mr-2">{{ data.title }}</span>
                          <span class="text-muted-color leading-6">{{
                            data.message
                          }}</span>
                        </div>
                      </td>

                      <td class="w-16">
                        @if (data.type) {
                          <p-tag
                            severity="secondary"
                            [value]="data.type"
                            class="font-medium"
                          ></p-tag>
                        }
                      </td>

                      <td class="w-28 relative">
                        <div
                          class="text-right leading-6 text-muted-color transition-opacity opacity-100 group-hover:opacity-0 group-focus-within:opacity-0 pointer-coarse:opacity-0"
                        >
                          {{ data.time }}
                        </div>
                        <div
                          class="absolute inset-0 flex items-center justify-end gap-1 pr-2 transition-opacity opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto group-focus-within:opacity-100 group-focus-within:pointer-events-auto pointer-coarse:opacity-100 pointer-coarse:pointer-events-auto"
                        >
                          <button
                            type="button"
                            aria-label="Marcar como leído"
                            pTooltip="Marcar como leído"
                            tooltipPosition="bottom"
                            class="w-8 h-8 inline-flex items-center justify-center bg-transparent text-muted-color hover:text-color hover:bg-emphasis active:bg-surface-200 dark:active:bg-surface-700 cursor-pointer rounded-lg transition-colors select-none"
                          >
                            <i class="fa-sharp fa-regular fa-envelope" aria-hidden="true"></i>
                          </button>
                          <button
                            type="button"
                            aria-label="Archivar"
                            pTooltip="Archivar"
                            tooltipPosition="bottom"
                            class="w-8 h-8 inline-flex items-center justify-center bg-transparent text-muted-color hover:text-color hover:bg-emphasis active:bg-surface-200 dark:active:bg-surface-700 cursor-pointer rounded-lg transition-colors select-none"
                          >
                            <i class="fa-sharp fa-regular fa-inbox" aria-hidden="true"></i>
                          </button>
                          <button
                            type="button"
                            aria-label="Eliminar"
                            pTooltip="Eliminar"
                            tooltipPosition="bottom"
                            class="w-8 h-8 inline-flex items-center justify-center bg-transparent text-muted-color hover:text-color hover:bg-emphasis active:bg-surface-200 dark:active:bg-surface-700 cursor-pointer rounded-lg transition-colors select-none"
                          >
                            <i class="fa-sharp fa-regular fa-trash" aria-hidden="true"></i>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </ng-template>
                  <ng-template #emptymessage>
                    <tr>
                      <td [attr.colspan]="6">
                        <app-empty-state
                          icon="fa-inbox"
                          title="Sin correos"
                          [description]="
                            search()
                              ? 'No encontramos correos que coincidan con tu búsqueda. Prueba con otros términos.'
                              : 'Tu bandeja está vacía. Los nuevos correos aparecerán aquí.'
                          "
                        />
                      </td>
                    </tr>
                  </ng-template>
                </p-table>
              </div>
