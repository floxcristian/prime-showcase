<div class="flex items-start gap-2 justify-between">
  <div>
    <div class="text-2xl leading-8 text-color font-medium">Clientes</div>
    <div class="mt-1 leading-6 text-muted-color">
      La lista de análisis muestra todos los usuarios
    </div>
  </div>
  <p-button
    icon="pi pi-circle-fill text-[var(--p-green-500)]"
    label="950 Usuarios activos"
    outlined
    severity="secondary"
  />
</div>
<div class="mt-10 mb-4 flex items-center justify-between">
  <p-iconfield iconPosition="left">
    <p-inputicon class="pi pi-search"> </p-inputicon>
    <input pInputText type="text" [ngModel]="search()" (ngModelChange)="search.set($event)" placeholder="Buscar" />
  </p-iconfield>
  <div class="flex items-center gap-3">
    <p-button icon="pi pi-filter" outlined severity="secondary" aria-label="Filtrar" />
    <p-divider layout="vertical" class="m-0 p-0" />
    <p-button icon="pi pi-refresh" outlined severity="secondary" aria-label="Actualizar" />
    <p-button label="1 de 15" outlined severity="secondary" />
    <p-button icon="pi pi-chevron-left" outlined severity="secondary" aria-label="Página anterior" />
    <p-button icon="pi pi-chevron-right" outlined severity="secondary" aria-label="Página siguiente" />
  </div>
</div>
<div
  class="flex-1 last:[&>td]:border-0 rounded-lg border border-surface w-full overflow-auto"
>
  <p-table
    [value]="tableData"
    [selection]="selectedRows()" (selectionChange)="selectedRows.set($event)"
    dataKey="id"
    [rows]="10"
    [dt]="tableTokens"
  >
    <ng-template #header>
      <tr>
        <th class="w-4">
          <p-tableHeaderCheckbox />
        </th>
        <th>Nombre</th>
        <th>Cargo</th>
        <th>Empresa</th>
        <th>Correo electrónico</th>
        <th>Origen</th>
        <th>Estado</th>
        <th>Más</th>
      </tr>
    </ng-template>
    <ng-template #body let-data>
      <tr>
        <td class="w-4">
          <p-tableCheckbox [value]="data" />
        </td>
        <td>
          <div class="flex items-center">
            <p-overlayBadge
              [severity]="
                data.active === undefined
                  ? 'contrast'
                  : data.active
                  ? 'success'
                  : 'danger'
              "
              styleClass="w-fit"
            >
              <p-avatar
                [image]="data.image"
                [label]="!data.image ? data.capName : ''"
                [ngClass]="{
                  'bg-violet-100 text-violet-950 text-xs font-medium':
                    !data.image,
                  'rounded-lg overflow-hidden flex': true
                }"
              />
            </p-overlayBadge>

            <div class="ml-4 leading-6 text-color font-medium">
              {{ data.name }}
            </div>
          </div>
        </td>
        <td>
          <div class="leading-6 text-muted-color">{{ data.title }}</div>
        </td>
        <td>
          <div class="flex items-center gap-2">
            <div
              class="flex items-center justify-center"
              [innerHTML]="companyLogos[data.company.logo]"
            ></div>

            <div class="leading-6 text-surface-600 dark:text-surface-400">
              {{ data.company.name }}
            </div>
          </div>
        </td>
        <td>
          <div class="leading-6 text-muted-color truncate">
            {{ data.email }}
          </div>
        </td>
        <td>
          <div class="leading-6 text-muted-color">{{ data.lead }}</div>
        </td>
        <td>
          <p-tag
            [severity]="
              data.status === 'Activo'
                ? 'success'
                : data.status === 'Inactivo'
                ? 'danger'
                : 'info'
            "
            [value]="data.status"
            styleClass="font-medium"
          />
        </td>
        <td>
          <div class="flex justify-end w-full">
            <p-button
              (click)="displayPopover($event, op)"
              icon="pi pi-search"
              rounded
              outlined
              severity="secondary"
            />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
  <p-popover #op>
    <ng-template #content>
      <div class="flex gap-2">
        <p-button
          label="Detalles"
          size="small"
          outlined
          (click)="op.hide()"
        ></p-button>
        <p-button
          label="Eliminar"
          severity="danger"
          size="small"
          outlined
          (click)="op.hide()"
        ></p-button>
      </div>
    </ng-template>
  </p-popover>
</div>
