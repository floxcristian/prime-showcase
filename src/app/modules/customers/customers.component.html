<div class="flex items-start gap-2 justify-between flex-wrap">
  <div class="min-w-0">
    <h1 class="text-2xl leading-8 text-color font-medium">Clientes</h1>
    <div class="mt-1 leading-6 text-muted-color">
      Gestión de la base de clientes de la compañía
    </div>
  </div>
  <!--
    Count pill: clarifica que "activos" = subset del total (no "conectados").
    Se oculta en mobile (<sm) para no competir con el título — la info se
    puede recuperar filtrando la tabla por estado. En sm+ vuelve a aparecer.
  -->
  <p-button
    icon="fa-sharp fa-solid fa-circle text-green-500"
    label="950 clientes activos"
    outlined
    severity="secondary"
    styleClass="hidden sm:inline-flex"
    ariaLabel="950 clientes con estado activo (de un total mayor)"
  />
</div>
<!--
  Action toolbar. Mobile (<lg): wrap a 2 filas — search full-width arriba,
  acciones abajo. Desktop (lg+): lado a lado con search a la izquierda.
  Paginación compact en mobile (sólo chevrons + contador) por ancho
  restringido.
-->
<div class="mt-6 lg:mt-10 mb-4 flex items-center justify-between gap-2 flex-wrap lg:flex-nowrap">
  <p-iconfield iconPosition="left" class="w-full lg:w-auto">
    <p-inputicon class="fa-sharp fa-regular fa-magnifying-glass"> </p-inputicon>
    <input pInputText type="text" [ngModel]="search()" (ngModelChange)="search.set($event)" placeholder="Buscar" aria-label="Buscar" class="w-full" />
  </p-iconfield>
  <div class="flex items-center gap-2 lg:gap-3 shrink-0">
    <p-button icon="fa-sharp fa-regular fa-filter" outlined severity="secondary" ariaLabel="Filtrar" pTooltip="Filtrar" tooltipPosition="bottom" />
    <p-divider layout="vertical" class="m-0 p-0 hidden lg:inline-flex" />
    <p-button icon="fa-sharp fa-regular fa-arrows-rotate" outlined severity="secondary" ariaLabel="Actualizar" pTooltip="Actualizar" tooltipPosition="bottom" />
    <!--
      Paginador condicional: cuando el filtro activo no devuelve resultados,
      mostrar `1/15` + chevrons es engañoso ("estás en página 1 de 15" pero
      la tabla está vacía). Con 0 resultados ocultamos el bloque entero —
      el empty state del table cubre el feedback. Patrón Linear / Stripe
      Dashboard / GitHub: paginador solo visible cuando hay datos paginables.
    -->
    @if (filteredTableData().length > 0) {
      <p-button label="1/15" outlined severity="secondary" ariaLabel="Página 1 de 15" styleClass="whitespace-nowrap" />
      <p-button icon="fa-sharp fa-regular fa-chevron-left" outlined severity="secondary" ariaLabel="Página anterior" pTooltip="Página anterior" tooltipPosition="bottom" />
      <p-button icon="fa-sharp fa-regular fa-chevron-right" outlined severity="secondary" ariaLabel="Página siguiente" pTooltip="Página siguiente" tooltipPosition="bottom" />
    }
  </div>
</div>
<!--
  Container de la tabla. El scroll horizontal vive en el inner
  `.p-datatable-table-container` de PrimeNG (overflow:auto manejado
  internamente). El scrollbar nativo aparece al fondo de ese container —
  visible cuando user scrollea hasta el final de las rows.
-->
<div
  class="flex-1 last:[&>td]:border-0 rounded-lg border border-surface w-full"
>
  <!--
    `min-width: 50rem` fuerza overflow horizontal en viewports angostos.
    Sin esto PrimeNG table colapsa los cells con text-wrap, produciendo
    filas de altura inconsistente con strings como "Gerente / de / producto"
    quebrados. Bigtech data tables (Stripe, Linear, GitHub) prefieren scroll
    horizontal + filas alineadas sobre cell-wrap.

    El affordance de scroll horizontal es la TRUNCACIÓN visible de cells
    al borde derecho ("Ejecutivo de venta...", "Gerente de produc..."). Es
    el patrón que usan Linear, Notion, Vercel — content cut-off comunica
    "hay más contenido", el thin scrollbar al fondo es el complemento.
  -->
  <p-table
    [value]="filteredTableData()"
    [selection]="selectedRows()" (selectionChange)="selectedRows.set($event)"
    dataKey="id"
    [rows]="10"
    [dt]="tableTokens"
    [tableStyle]="{ 'min-width': '50rem' }"
    [pt]="{ tableContainer: { class: 'scroll-fade-x' } }"
  >
    <ng-template #header>
      <tr>
        <th scope="col" class="w-4">
          <p-tableHeaderCheckbox />
        </th>
        <th scope="col">Nombre</th>
        <th scope="col">Cargo</th>
        <th scope="col">Empresa</th>
        <th scope="col">Correo electrónico</th>
        <th scope="col">Origen</th>
        <th scope="col">Estado</th>
        <th scope="col">Más</th>
      </tr>
    </ng-template>
    <ng-template #body let-data>
      <tr>
        <td class="w-4">
          <p-tableCheckbox [value]="data" />
        </td>
        <td class="whitespace-nowrap">
          <div class="flex items-center">
            <p-overlayBadge
              [severity]="
                data.active === undefined
                  ? 'contrast'
                  : data.active
                  ? 'success'
                  : 'danger'
              "
              class="w-fit"
            >
              <p-avatar
                [image]="data.image"
                [label]="!data.image ? data.capName : ''"
                class="rounded-lg overflow-hidden flex"
                [ngClass]="{
                  '!bg-primary-100 !text-primary-950 text-xs font-medium': !data.image
                }"
              />
            </p-overlayBadge>

            <div class="ml-4 leading-6 text-color font-medium">
              {{ data.name }}
            </div>
          </div>
        </td>
        <td class="whitespace-nowrap">
          <div class="leading-6 text-muted-color">{{ data.title }}</div>
        </td>
        <td class="whitespace-nowrap">
          <div class="flex items-center gap-2">
            <!-- Logo decorativo: el nombre textual de la empresa va al lado
                 (línea siguiente) — aria-hidden evita double-announce en SR
                 ("Logo Mistranet, Mistranet"). Patrón WCAG: iconos
                 acompañados de texto descriptivo deben ser aria-hidden. -->
            <div
              aria-hidden="true"
              class="flex items-center justify-center"
              [innerHTML]="companyLogos[data.company.logo]"
            ></div>

            <div class="leading-6 text-surface-600 dark:text-surface-400">
              {{ data.company.name }}
            </div>
          </div>
        </td>
        <td class="whitespace-nowrap">
          <div class="leading-6 text-muted-color">
            {{ data.email }}
          </div>
        </td>
        <td class="whitespace-nowrap">
          <div class="leading-6 text-muted-color">{{ data.lead }}</div>
        </td>
        <td>
          <p-tag
            [severity]="
              data.status === 'Activo'
                ? 'success'
                : data.status === 'Inactivo'
                ? 'danger'
                : 'info'
            "
            [value]="data.status"
            class="font-medium"
          />
        </td>
        <td>
          <div class="flex justify-end w-full">
            <!--
              Icono `fa-ellipsis` (no `fa-magnifying-glass`) porque el botón
              abre un menú de ACCIONES (Detalles / Eliminar), no una vista
              de búsqueda. Magnifying-glass = "search" semánticamente, el
              uso anterior era semánticamente incorrecto.
            -->
            <p-button
              (onClick)="displayPopover($event, op)"
              icon="fa-sharp fa-regular fa-ellipsis"
              rounded
              outlined
              severity="secondary"
              ariaLabel="Más acciones"
              pTooltip="Más acciones"
              tooltipPosition="bottom"
            />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td [attr.colspan]="8">
          <app-empty-state
            icon="fa-users"
            title="Sin clientes"
            [description]="
              search()
                ? 'No encontramos clientes que coincidan con tu búsqueda. Prueba con otros términos.'
                : 'Aún no hay clientes registrados. Los nuevos aparecerán aquí.'
            "
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
  <p-popover #op>
    <ng-template #content>
      <div class="flex gap-2">
        <p-button
          label="Detalles"
          size="small"
          outlined
          (onClick)="op.hide()"
        ></p-button>
        <p-button
          label="Eliminar"
          severity="danger"
          size="small"
          outlined
          (onClick)="op.hide()"
        ></p-button>
      </div>
    </ng-template>
  </p-popover>
</div>
